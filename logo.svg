<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0000;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="glowRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff2200;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ff2200;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
  </defs>

  <!-- Fondo circular -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)"/>
  <circle cx="100" cy="100" r="96" fill="url(#glowRed)" opacity="0.6"/>

  <!-- Borde exterior doble -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#cc1100" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#660000" stroke-width="0.8"/>

  <!-- Marcas de tick en el borde -->
  <g stroke="#cc1100" stroke-width="1.5" opacity="0.7">
    <line x1="100" y1="6" x2="100" y2="14"/>
    <line x1="100" y1="186" x2="100" y2="194"/>
    <line x1="6" y1="100" x2="14" y2="100"/>
    <line x1="186" y1="100" x2="194" y2="100"/>
    <line x1="32" y1="32" x2="38" y2="38"/>
    <line x1="162" y1="162" x2="168" y2="168"/>
    <line x1="162" y1="32" x2="168" y2="38"/>   
    <line x1="32" y1="162" x2="38" y2="168"/>
  </g>

  <!-- Cruz de mira central (crosshair) -->
  <g filter="url(#glow)" stroke="#ff3300" stroke-width="1.2" opacity="0.9">
    <line x1="100" y1="28" x2="100" y2="60"/>
    <line x1="100" y1="140" x2="100" y2="172"/>
    <line x1="28" y1="100" x2="60" y2="100"/>
    <line x1="140" y1="100" x2="172" y2="100"/>
    <circle cx="100" cy="100" r="22" fill="none" stroke-width="1"/>
    <circle cx="100" cy="100" r="36" fill="none" stroke-width="0.6" stroke-dasharray="4,6"/>
  </g>

  <!-- Icono zombie / calavera simplificada -->
  <!-- Cabeza -->
  <ellipse cx="100" cy="82" rx="22" ry="24" fill="none" stroke="#dd2200" stroke-width="1.8" filter="url(#softGlow)"/>
  <!-- Ojos -->
  <ellipse cx="91" cy="78" rx="5" ry="6" fill="#ff2200" opacity="0.9" filter="url(#glow)"/>
  <ellipse cx="109" cy="78" rx="5" ry="6" fill="#ff2200" opacity="0.9" filter="url(#glow)"/>
  <!-- Pupilas -->
  <circle cx="91" cy="79" r="2.5" fill="#1a0000"/>
  <circle cx="109" cy="79" r="2.5" fill="#1a0000"/>
  <!-- Nariz -->
  <path d="M97 86 L100 91 L103 86" fill="none" stroke="#cc1100" stroke-width="1.2"/>
  <!-- Boca / dientes -->
  <rect x="88" y="95" width="24" height="7" rx="2" fill="none" stroke="#cc1100" stroke-width="1.2"/>
  <line x1="94" y1="95" x2="94" y2="102" stroke="#cc1100" stroke-width="0.8"/>
  <line x1="100" y1="95" x2="100" y2="102" stroke="#cc1100" stroke-width="0.8"/>
  <line x1="106" y1="95" x2="106" y2="102" stroke="#cc1100" stroke-width="0.8"/>

  <!-- Texto "L4D2" abajo -->
  <text x="100" y="138" text-anchor="middle" font-family="'Courier New', monospace" font-weight="900" font-size="18" fill="#ff3300" letter-spacing="3" filter="url(#glow)">L4D2</text>
  <!-- Línea decorativa -->
  <line x1="62" y1="143" x2="138" y2="143" stroke="#660000" stroke-width="0.8"/>
  <!-- Subtexto -->
  <text x="100" y="157" text-anchor="middle" font-family="'Courier New', monospace" font-size="7.5" fill="#993300" letter-spacing="2.5">PLUGINS HUB</text>
  <text x="100" y="168" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#662200" letter-spacing="2">SOURCEMOD</text>

</svg>
